name: jimeng-content-generator
description: 基于火山引擎即梦AI的文生图/文生视频能力，支持通过文本描述生成图片和视频
version: 1.3.3

requirements:
  env:
    - name: OPENCLAW_MEDIA_PATH
      description: OpenClaw media 目录绝对路径，图片/视频将保存到该目录下的 jimeng-generate 文件夹
      required: true
    - name: VOLCENGINE_AK
      description: 火山引擎 Access Key
      required: true
    - name: VOLCENGINE_SK
      description: 火山引擎 Secret Key（永久凭证必需）
      required: false
    - name: VOLCENGINE_TOKEN
      description: 安全令牌（临时凭证 STS 必需）
      required: false
  
  note: |
    使用临时凭证（AKTP 开头）时，可以只使用 AK + Token，不需要 SK。
    获取方式：登录火山引擎控制台 → 访问控制 → 密钥管理
    
    OpenClaw Media 路径配置：
    - Windows: C:\Users\Username\AppData\Roaming\OpenClaw\media
    - Mac/Linux: /Users/username/.config/OpenClaw/media
    可在 .env 文件中配置 OPENCLAW_MEDIA_PATH 环境变量

scripts:
  text2image: npx ts-node scripts/text2image.ts
  text2video: npx ts-node scripts/text2video.ts
